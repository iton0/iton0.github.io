<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1" shrink-to-fit=no>
	<title>Contact | Ihsan Tonuzi</title>
	<!-- For 16x16 favicon -->
	<link rel="icon" type="image/png" sizes="16x16" href="./img/favicon-16x16.png">
	<!-- For 32x32 favicon -->
	<link rel="icon" type="image/png" sizes="32x32" href="./img/favicon-32x32.png">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9"
		crossorigin="anonymous">
	<link rel="stylesheet" href="custom.css">
</head>

<body>
	<header class="container">
		<nav class="navbar navbar-expand-lg navbar-light">
			<a class="navbar-brand" href="index.html"><img src="img/ihsantonuzi.svg" class="logo"
					alt="Ihsan Tonuzi Logo" /></a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse"
				data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup"
				aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse justify-content-end" id="navbarNavAltMarkup">
				<div class="navbar-nav">
					<a class="nav-link" href="about.html">About</a>
					<a class="nav-link" href="portfolio.html">Portfolio</a>
					<a class="nav-link" href="contact.html">Contact</a>
				</div>
			</div>
		</nav>
	</header>
	<div class="container site-content">
		<form action="https://formsubmit.co/fcb366085f66beb5971b5b13dfe5602c" method="POST">
			<!--Honeypot-->
			<input type="text" name="_honey" style="display: none;">
			<!--Disable Captcha-->
			<input type="hidden" name="_captcha" value="false">
			<!--Success Message Link-->
			<input type="hidden" name="_next" value="https://iton0.github.io/success.html">
			<div class="row g-3">
				<div class="col-md-6">
					<div class="mb-3">
						<label for="firstName" class="form-label">First Name</label>
						<input type="text" class="form-control" name="FirstName" id="firstName"
							required>
					</div>
				</div>
				<div class="col-md-6">
					<div class="mb-3">
						<label for="lastName" class="form-label">Last Name</label>
						<input type="text" class="form-control" name="lastName" id="lastName"
							required>
					</div>
				</div>
				<div class="col-md-12">
					<div class="mb-3">
						<label for="email" class="form-label">Email</label>
						<input type="email" class="form-control" name="email" id="email"
							required>
					</div>
				</div>
				<div class="col-md-12">
					<div class="mb-3">
						<label for="message" class="form-label">Message</label>
						<textarea class="form-control" id="message" name="message" rows="4"
							required></textarea>
					</div>
				</div>
				<div class="col-md-12">
					<button type="submit" class="btn btn-primary">Submit</button>
				</div>
			</div>
		</form>
	</div>
	<footer>
		<div class="container text-center">
			<p>Find me on
				<a href="https://www.linkedin.com/in/itonuzi" target="_blank">LinkedIn</a> and
				<a href="https://github.com/iton0" target="_blank">Github</a>
			</p>
		</div>
		<div class="container text-center">
			<p class="small">&copy; <span id="year"></span>, Ihsan Tonuzi</p>

		</div>
	</footer>
	<script>
		document.getElementById("year").innerHTML = new Date().getFullYear();
	</script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
		integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm"
		crossorigin="anonymous"></script>
</body>

</html>
